<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost Item — Austin Greer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #f5f5f3;
      color: #111;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      max-width: 400px;
      width: 100%;
      padding: 3rem 2.5rem;
      text-align: center;
    }

    .alert-bar {
      background: #111;
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.6rem 1rem;
      margin: -3rem -2.5rem 2.5rem;
    }

    .icon {
      font-size: 36px;
      margin-bottom: 1.25rem;
      display: block;
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: #111;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .subline {
      font-size: 13px;
      color: #888;
      font-weight: 300;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 0.5px solid #e0e0e0;
      margin: 0 0 2rem;
    }

    .owner-name {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #111;
      margin-bottom: 1.5rem;
    }

    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .contact-item {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .contact-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
    }

    .contact-value {
      font-size: 15px;
      font-weight: 500;
      color: #111;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-value:hover { color: #555; }

    .cta-row {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      flex: 1;
      display: block;
      padding: 0.75rem 1rem;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s, color 0.2s;
    }

    .btn-primary {
      background: #111;
      color: #fff;
      border: 1px solid #111;
    }

    .btn-primary:hover { background: #333; border-color: #333; }

    .btn-secondary {
      background: #fff;
      color: #111;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover { background: #f5f5f3; }

    .thank-you {
      margin-top: 2rem;
      font-size: 12px;
      color: #bbb;
      font-weight: 300;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="alert-bar">Found something?</div>

    <span class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.686 2 6 4.686 6 8c0 4.5 6 12 6 12s6-7.5 6-12c0-3.314-2.686-6-6-6z"/>
        <circle cx="12" cy="8" r="2"/>
      </svg>
    </span>
    <h1 class="headline">This item has been lost.</h1>
    <p class="subline">Please help return it to its owner.</p>

    <hr class="divider" />

    <p class="owner-name">Austin Greer</p>

    <div class="contact-block">
      <div class="contact-item">
        <span class="contact-label">Text or Call</span>
        <a class="contact-value" href="tel:+12702450938">+1 (270) 245-0938</a>
      </div>
      <div class="contact-item">
        <span class="contact-label">Email</span>
        <a class="contact-value" href="mailto:austin.greer6@gmail.com">austin.greer6@gmail.com</a>
      </div>
    </div>

    <div class="cta-row">
      <a class="btn btn-primary" href="tel:+12702450938">Call Now</a>
      <a class="btn btn-secondary" href="mailto:austin.greer6@gmail.com">Send Email</a>
    </div>

    <p class="thank-you">Thank you for your kindness.</p>
  </div>
</body>
</html>
